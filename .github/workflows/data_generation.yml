name: AI Data Generation

on:
  schedule:
    - cron: '45 4 * * *'
  workflow_dispatch:

env:
  APP_NAME: "Country Trivia Web App"
  DEPLOY_USER: "dietpi"
  DEPLOY_HOST: "10.100.10.5"
  DEPLOY_DIR: "/opt/homelab-iac/services/apps/country-trivia-web"
  DISCORD_SUCCESS_COLOR: "3066993"
  DISCORD_FAIL_COLOR: "15158332"

jobs:
  run-generation:
    runs-on: self-hosted
    steps:
      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.RASPBERRY_PI_SSH_KEY }}

      - name: Add Deploy Host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts || true

      - name: Trigger AI Fact Generation
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "cd ${{ env.DEPLOY_DIR }} && docker compose exec -T trivia-backend python manage.py generate_fun_facts"

      - name: Trigger AI Quiz Question Generation
        run: |
          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} "cd ${{ env.DEPLOY_DIR }} && docker compose exec -T trivia-backend python manage.py generate_quiz_questions"

      - name: Notify Success
        if: success()
        run: |
          TIMESTAMP=$(TZ='America/New_York' date +'%a, %d %b %Y at %H:%M %Z')
          printf -v DESC ":brain: **Trivia Data Updated**\nSuccessfully generated new AI fun facts and quiz questions for the database pools.\n\n:clock4: **Time:** $TIMESTAMP"
          PAYLOAD=$(jq -n --arg title "✅ AI Data Generation Complete" \
                          --arg desc "$DESC" \
                          --argjson color ${{ env.DISCORD_SUCCESS_COLOR }} \
                          '{embeds: [{title: $title, description: $desc, color: $color}]}')
          curl -s --max-time 10 -H "Content-Type: application/json" -X POST -d "$PAYLOAD" ${{ secrets.DISCORD_WEBHOOK_URL_GITHUB }} || true

      - name: Notify Failure
        if: failure()
        run: |
          TIMESTAMP=$(TZ='America/New_York' date +'%a, %d %b %Y at %H:%M %Z')
          printf -v DESC ":x: **Trivia Data Generation Failed**\n**:warning: Error Details:**\nCheck GitHub Actions logs for run #${{ github.run_number }}.\nThe scheduled AI task did not complete successfully.\n\n:clock4: **Time:** $TIMESTAMP"
          PAYLOAD=$(jq -n --arg title "🚨 AI Data Generation Alert" \
                          --arg desc "$DESC" \
                          --argjson color ${{ env.DISCORD_FAIL_COLOR }} \
                          '{embeds: [{title: $title, description: $desc, color: $color}]}')
          curl -s --max-time 10 -H "Content-Type: application/json" -X POST -d "$PAYLOAD" ${{ secrets.DISCORD_WEBHOOK_URL_GITHUB }} || true
