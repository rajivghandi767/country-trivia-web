services:
  # -----------------------------------------
  # Database Layer
  # -----------------------------------------
  trivia-local-db:
    image: postgres:18-alpine
    container_name: trivia-local-db
    restart: unless-stopped
    env_file: .env.example
    networks:
      - trivia-local
    ports:
      - "5432:5432"
    volumes:
      - trivia-local-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trivia-prod -d postgres-core"]
      interval: 5s
      timeout: 5s
      retries: 5

  # -----------------------------------------
  # Caching Layer
  # -----------------------------------------
  trivia-local-redis:
    image: redis:7-alpine
    container_name: trivia-local-redis
    restart: unless-stopped
    networks:
      - trivia-local
    ports:
      - "6379:6379"

  # -----------------------------------------
  # Django Backend (Smart Server)
  # -----------------------------------------
  trivia-local-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trivia-local-backend
    env_file: .env.example
    networks:
      - trivia-local
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      trivia-local-db:
        condition: service_healthy
      trivia-local-redis:
        condition: service_started
    command: >
      sh -c "python manage.py migrate && 
             python manage.py createcachetable && 
             python manage.py seed_data && 
             python manage.py runserver 0.0.0.0:8000"

  # -----------------------------------------
  # React Frontend (Dumb Client)
  # -----------------------------------------
  trivia-local-frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trivia-local-frontend
    env_file: .env.example
    networks:
      - trivia-local
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - trivia-local-backend

volumes:
  trivia-local-db-data:

networks:
  trivia-local:
